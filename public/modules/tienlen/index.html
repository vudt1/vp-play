<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tiến Lên · VP Play</title>
  <link rel="stylesheet" href="css/cardgame.css" />
  <script>
    (function () {
      function sanitizeBase(raw) {
        if (raw == null || raw === '') return '';
        var s = String(raw).trim();
        if (!s) return '';
        if (!/^\/[A-Za-z0-9/_-]*$/.test(s)) return '';
        if (s.indexOf('//') !== -1) return '';
        return s.replace(/\/+$/, '');
      }
      var fromQuery = sanitizeBase(new URLSearchParams(window.location.search).get('base'));
      var fromParent = '';
      try {
        if (window.parent && window.parent !== window && window.parent.VP_BASE != null) {
          fromParent = sanitizeBase(window.parent.VP_BASE);
        }
      } catch (_) {}
      window.VP_BASE = fromQuery || fromParent || '';
    })();
  </script>
</head>
<body>
  <div id="game-root"></div>
  <script src="js/libs/pixi.min.js"></script>
  <script src="js/libs/gsap.min.js"></script>
  <script src="js/libs/howler.min.js"></script>
  <script>
    (function () {
      var base = window.VP_BASE || '';
      function loadScript(src, onload) {
        var s = document.createElement('script');
        s.src = src;
        if (onload) s.onload = onload;
        document.body.appendChild(s);
      }
      loadScript(base + '/socket.io/socket.io.js', function () {
        loadScript('js/sounds.js', function () {
          loadScript('js/card.js', function () {
            loadScript('js/deck.js', function () {
              loadScript('js/animations.js', function () {
                loadScript('js/game.js');
              });
            });
          });
        });
      });
    })();
  </script>
</body>
</html>
