<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background Gradient (Festive Red) -->
    <linearGradient id="bg-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c" />
      <stop offset="100%" stop-color="#962d22" />
    </linearGradient>

    <!-- Golden Accent Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff2cc" />
      <stop offset="50%" stop-color="#f1c40f" />
      <stop offset="100%" stop-color="#b88d40" />
    </linearGradient>

    <!-- Wood Texture for the Cylinder -->
    <radialGradient id="wood-grad" cx="45%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="60%" stop-color="#f5e6c4" />
      <stop offset="100%" stop-color="#d5b575" />
    </radialGradient>
  </defs>

  <!-- BACKGROUND CONTAINER -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#bg-red)" stroke="url(#gold-grad)" stroke-width="2"/>
  <rect x="4" y="4" width="56" height="56" rx="10" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- CORNER DECORATIONS -->
  <g stroke="url(#gold-grad)" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 6 12 L 6 6 L 12 6" />
    <path d="M 58 12 L 58 6 L 52 6" />
    <path d="M 6 52 L 6 58 L 12 58" />
    <path d="M 58 52 L 58 58 L 52 58" />
  </g>

  <!-- MINI LOTO TICKET (Back Layer) -->
  <g transform="translate(10, 8) rotate(-8)">
    <rect width="36" height="24" rx="3" fill="#fffde6" stroke="#f1c40f" stroke-width="1.5"/>
    <!-- Simple grid representation -->
    <g stroke="#f39c12" stroke-width="0.5" opacity="0.4">
      <line x1="12" y1="0" x2="12" y2="24"/>
      <line x1="24" y1="0" x2="24" y2="24"/>
      <line x1="0" y1="8" x2="36" y2="8"/>
      <line x1="0" y1="16" x2="36" y2="16"/>
    </g>
    <!-- Mini checked tokens -->
    <circle cx="6" cy="4" r="2.2" fill="#e74c3c" opacity="0.8"/>
    <circle cx="30" cy="12" r="2.2" fill="#e74c3c" opacity="0.8"/>
    <circle cx="18" cy="20" r="2.2" fill="#e74c3c" opacity="0.8"/>
  </g>

  <!-- WOODEN LOTO TOKEN (Front Layer) -->
  <g transform="translate(32, 28)">
    <!-- Wooden circle -->
    <circle cx="0" cy="0" r="14" fill="url(#wood-grad)" stroke="#8e601c" stroke-width="1.2" filter="drop-shadow(0px 3px 4px rgba(0,0,0,0.35))"/>
    <!-- Red circle stamp -->
    <circle cx="0" cy="0" r="10.5" fill="none" stroke="#e74c3c" stroke-width="0.8" stroke-dasharray="2 1" opacity="0.7"/>
    <!-- Number 68 -->
    <text x="0" y="4.5" text-anchor="middle" font-family="'Times New Roman', Georgia, serif" font-size="13" font-weight="900" fill="#c0392b">68</text>
  </g>

  <!-- APRICOT FLOWER (Hoa Mai Vàng) -->
  <g transform="translate(48, 14) scale(0.35)">
    <g fill="#ffcf2d" stroke="#d35400" stroke-width="1.2">
      <path d="M 0 0 C -12 -15, -8 -32, 0 -32 C 8 -32, 12 -15, 0 0" />
      <path d="M 0 0 C -12 -15, -8 -32, 0 -32 C 8 -32, 12 -15, 0 0" transform="rotate(72)" />
      <path d="M 0 0 C -12 -15, -8 -32, 0 -32 C 8 -32, 12 -15, 0 0" transform="rotate(144)" />
      <path d="M 0 0 C -12 -15, -8 -32, 0 -32 C 8 -32, 12 -15, 0 0" transform="rotate(216)" />
      <path d="M 0 0 C -12 -15, -8 -32, 0 -32 C 8 -32, 12 -15, 0 0" transform="rotate(288)" />
    </g>
    <circle cx="0" cy="0" r="5" fill="#e74c3c" stroke="#d35400" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="2.5" fill="#fcf3cf"/>
  </g>

  <!-- LÔ TÔ TYPOGRAPHY -->
  <g filter="drop-shadow(0px 1px 2px rgba(0,0,0,0.5))">
    <text x="32" y="53" text-anchor="middle" font-family="'Times New Roman', Georgia, serif" font-size="9.5" font-weight="900" fill="url(#gold-grad)" stroke="#4a0102" stroke-width="0.4" letter-spacing="1">LÔ TÔ</text>
  </g>
</svg>
