<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 820" width="100%" height="100%">
  <defs>
    <!-- Elegant traditional corner ornament (lotus + cloud curves) -->
    <g id="indochine-corner">
      <!-- Stylized cloud/lotus scroll -->
      <path d="M 15 65 C 15 50, 30 35, 45 35 C 60 35, 60 50, 45 50 C 30 50, 30 65, 45 65 C 60 65, 75 50, 75 35" fill="none" stroke="#F4D03F" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M 30 80 C 30 70, 40 60, 55 60 C 70 60, 70 75, 55 75" fill="none" stroke="#F4D03F" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Lotus leaf accent -->
      <path d="M 10 45 C 15 25, 25 15, 45 10" fill="none" stroke="#1A2030" stroke-width="2" stroke-linecap="round"/>
      <!-- Small gold circle accent -->
      <circle cx="15" cy="15" r="3" fill="#F4D03F" />
    </g>

    <!-- Central banner centerpiece -->
    <g id="center-banner">
      <path d="M -80 0 L -60 12 L 60 12 L 80 0 Z" fill="#1A2030" />
      <circle cx="0" cy="6" r="4" fill="#F4D03F" />
      <path d="M -110 6 L -90 6 M 90 6 L 110 6" stroke="#F4D03F" stroke-width="2" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Outer Main Border -->
  <rect x="15" y="15" width="1150" height="790" rx="30" ry="30" fill="none" stroke="#1A2030" stroke-width="5" />
  
  <!-- Inner Dash / Gold Line -->
  <rect x="25" y="25" width="1130" height="770" rx="20" ry="20" fill="none" stroke="#F4D03F" stroke-width="2" stroke-dasharray="10 6" />

  <!-- Reuse Corner Ornaments (symmetrically translated and rotated) -->
  <!-- Top-Left -->
  <use href="#indochine-corner" transform="translate(25, 25)" />
  <!-- Top-Right -->
  <use href="#indochine-corner" transform="translate(1155, 25) scale(-1, 1)" />
  <!-- Bottom-Left -->
  <use href="#indochine-corner" transform="translate(25, 795) scale(1, -1)" />
  <!-- Bottom-Right -->
  <use href="#indochine-corner" transform="translate(1155, 795) scale(-1, -1)" />

  <!-- Traditional Top/Bottom Banner Centerpiece -->
  <use href="#center-banner" transform="translate(590, 25)" />
  <use href="#center-banner" transform="translate(590, 795) scale(1, -1)" />
</svg>
