<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <g>
    <!-- Waving transform relative to wrist joint pivot at (32, 56) -->
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      values="0 32 56; 12 32 56; 0 32 56; -12 32 56; 0 32 56" 
      dur="1s" 
      repeatCount="indefinite" />
      
    <!-- Index finger -->
    <path d="M18 34V18c0-2.2 1.8-4 4-4s4 1.8 4 4v16" stroke="#1A2030" stroke-width="3.5" fill="#FFFFFF" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Middle finger -->
    <path d="M26 52V28c0-2.2 1.8-4 4-4s4 1.8 4 4v10" stroke="#1A2030" stroke-width="3.5" fill="#FFFFFF" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Ring finger -->
    <path d="M34 38V22c0-2.2 1.8-4 4-4s4 1.8 4 4v18" stroke="#1A2030" stroke-width="3.5" fill="#FFFFFF" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Pinky, Palm and Thumb -->
    <path d="M42 36V26c0-2.2 1.8-4 4-4s4 1.8 4 4v16c0 8-6 14-14 14H30c-6 0-12-4-14-10l-6-16c-1-2.5 1-5 3.7-5 1.3 0 2.5.7 3.2 1.8L22 34" stroke="#1A2030" stroke-width="3.5" fill="#FFFFFF" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Gold wrist band accent -->
    <path d="M20 54 H36" stroke="#F4D03F" stroke-width="4.5" stroke-linecap="round" />
  </g>
</svg>
