<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 480" width="800" height="480" preserveAspectRatio="xMidYMid slice" class="w-full h-full">
  <defs>
    <!-- Background Radial Gradient (Casino Emerald Green felt vibe) -->
    <radialGradient id="bg-glow" cx="50%" cy="85%" r="75%">
      <stop offset="0%" stop-color="#12442e" />
      <stop offset="50%" stop-color="#0a2318" />
      <stop offset="100%" stop-color="#050a0e" />
    </radialGradient>

    <!-- Card Spotlight Aura -->
    <radialGradient id="spotlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#228559" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#228559" stop-opacity="0" />
    </radialGradient>

    <!-- Golden Frame Accent Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe293" />
      <stop offset="50%" stop-color="#c5a059" />
      <stop offset="100%" stop-color="#806020" />
    </linearGradient>

    <!-- Drop Shadow Filter for Floating Cards -->
    <filter id="card-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="15" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Card Symbol Definitions from Game Assets -->
    <!-- 'A' in black (Clubs) -->
    <symbol id="Rac" viewBox="-500 -500 1000 1000" preserveAspectRatio="xMinYMid" opacity="0.8">
      <path d="M-270 460L-110 460M-200 450L0 -460L200 450M110 460L270 460M-120 130L120 130" stroke="#000000" fill="none" fill-opacity="1" stroke-width="110" />
    </symbol>
    
    <!-- 'A' in red (Hearts/Diamonds) -->
    <symbol id="Rad" viewBox="-500 -500 1000 1000" preserveAspectRatio="xMinYMid" opacity="0.8">
      <path d="M-270 460L-110 460M-200 450L0 -460L200 450M110 460L270 460M-120 130L120 130" stroke="#e31b23" fill="none" fill-opacity="1" stroke-width="110" />
    </symbol>

    <!-- Heart Symbol (Red) -->
    <symbol id="S1ah" viewBox="-600 -600 1200 1200" preserveAspectRatio="xMinYMid" opacity="0.8">
      <path d="M0 -300C0 -400 100 -500 200 -500C300 -500 400 -400 400 -250C400 0 0 400 0 500C0 400 -400 0 -400 -250C-400 -400 -300 -500 -200 -500C-100 -500 0 -400 -0 -300" fill="#e31b23" fill-opacity="1" />
    </symbol>

    <!-- Diamond Symbol (Red) -->
    <symbol id="S2ad" viewBox="-600 -600 1200 1200" preserveAspectRatio="xMinYMid" opacity="0.8">
      <path d="M-400 0C-350 0 0 -450 0 -500C0 -450 350 0 400 0C350 0 0 450 0 500C0 450 -350 0 -400 0" fill="#e31b23" fill-opacity="1" />
    </symbol>

    <!-- Club/Clover Symbol (Black) -->
    <symbol id="S3ac" viewBox="-600 -600 1200 1200" preserveAspectRatio="xMinYMid" opacity="0.8">
      <path d="M30 150C35 385 85 400 130 500L-130 500C-85 400 -35 385 -30 150A10 10 0 0 0 -50 150A210 210 0 1 1 -124 -51A10 10 0 0 0 -110 -65A230 230 0 1 1 110 -65A10 10 0 0 0 124 -51A210 210 0 1 1 50 150A10 10 0 0 0 30 150" fill="#000000" fill-opacity="1" />
    </symbol>

    <!-- Complete Card Components -->
    <!-- Ace of Clubs (DA) -->
    <g id="card-DA">
      <rect width="239" height="333" x="-119.5" y="-166.5" rx="14" ry="14" stroke="#dcdfe6" fill="#ffffff" fill-opacity="1" stroke-width="1.5" />
      <use href="#Rac" height="39" x="-120" y="-158" />
      <use href="#S3ac" height="42" x="-121" y="-119" />
      <use href="#S3ac" height="140" x="-70" y="-70" />
      <g transform="rotate(180)">
        <use href="#Rac" height="39" x="-120" y="-158" />
        <use href="#S3ac" height="42" x="-121" y="-119" />
      </g>
    </g>

    <!-- Ace of Diamonds (HA) -->
    <g id="card-HA">
      <rect width="239" height="333" x="-119.5" y="-166.5" rx="14" ry="14" stroke="#dcdfe6" fill="#ffffff" fill-opacity="1" stroke-width="1.5" />
      <use href="#Rad" height="39" x="-120" y="-158" />
      <use href="#S2ad" height="42" x="-121" y="-119" />
      <use href="#S2ad" height="140" x="-70" y="-70" />
      <g transform="rotate(180)">
        <use href="#Rad" height="39" x="-120" y="-158" />
        <use href="#S2ad" height="42" x="-121" y="-119" />
      </g>
    </g>

    <!-- Ace of Hearts (CA) -->
    <g id="card-CA">
      <rect width="239" height="333" x="-119.5" y="-166.5" rx="14" ry="14" stroke="#dcdfe6" fill="#ffffff" fill-opacity="1" stroke-width="1.5" />
      <use href="#Rad" height="39" x="-120" y="-158" />
      <use href="#S1ah" height="42" x="-121" y="-119" />
      <use href="#S1ah" height="140" x="-70" y="-70" />
      <g transform="rotate(180)">
        <use href="#Rad" height="39" x="-120" y="-158" />
        <use href="#S1ah" height="42" x="-121" y="-119" />
      </g>
    </g>
  </defs>

  <style>
    /* Styling for the card pivot wrapper */
    .card-pivot {
      transform-origin: 0 0;
    }
    
    /* Intro fanning animations */
    .anim-da {
      animation: fan-da 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }
    .anim-ha {
      animation: fan-ha 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }
    .anim-ca {
      animation: fan-ca 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }

    @keyframes fan-da {
      0% { transform: rotate(0deg) translate(0, 100px); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: rotate(-18deg) translate(0, 0); opacity: 1; }
    }
    @keyframes fan-ha {
      0% { transform: rotate(0deg) translate(0, 100px); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: rotate(0deg) translate(0, -15px); opacity: 1; }
    }
    @keyframes fan-ca {
      0% { transform: rotate(0deg) translate(0, 100px); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: rotate(18deg) translate(0, 0); opacity: 1; }
    }

    /* Hover micro-interactions (triggers on SVG hover or parent card tile hover) */
    .hover-da, .hover-ha, .hover-ca {
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }
    
    svg:hover .hover-da, .group:hover .hover-da {
      transform: rotate(-10deg) translate(-35px, -25px);
    }
    svg:hover .hover-ha, .group:hover .hover-ha {
      transform: translate(0, -35px) scale(1.06);
    }
    svg:hover .hover-ca, .group:hover .hover-ca {
      transform: rotate(10deg) translate(35px, -25px);
    }
  </style>

  <!-- Background layer -->
  <rect width="800" height="480" fill="url(#bg-glow)" />

  <!-- Center spotlight glow behind the cards -->
  <ellipse cx="400" cy="240" rx="350" ry="200" fill="url(#spotlight)" />

  <!-- Luxury Golden Border -->
  <rect x="20" y="20" width="760" height="440" rx="10" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" stroke-opacity="0.3" />
  <rect x="25" y="25" width="750" height="430" rx="8" fill="none" stroke="url(#gold-grad)" stroke-width="0.75" stroke-opacity="0.15" />

  <!-- Corner details for a premium look -->
  <g stroke="url(#gold-grad)" stroke-width="2" fill="none" stroke-opacity="0.5" stroke-linecap="round">
    <path d="M 20 40 L 20 20 L 40 20" />
    <path d="M 780 40 L 780 20 L 760 20" />
    <path d="M 20 440 L 20 460 L 40 460" />
    <path d="M 780 440 L 780 460 L 760 460" />
  </g>

  <!-- Cards Presentation Fan Group -->
  <!-- Pivot point is at x=400, y=395 -->
  <g transform="translate(400, 395) scale(0.95)">
    <!-- Ace of Clubs (Left Card) -->
    <g class="card-pivot anim-da">
      <g class="hover-da" filter="url(#card-shadow)">
        <g transform="translate(0, -180)">
          <use href="#card-DA" />
        </g>
      </g>
    </g>

    <!-- Ace of Diamonds (Middle Card) -->
    <g class="card-pivot anim-ha">
      <g class="hover-ha" filter="url(#card-shadow)">
        <g transform="translate(0, -180)">
          <use href="#card-HA" />
        </g>
      </g>
    </g>

    <!-- Ace of Hearts (Right Card) -->
    <g class="card-pivot anim-ca">
      <g class="hover-ca" filter="url(#card-shadow)">
        <g transform="translate(0, -180)">
          <use href="#card-CA" />
        </g>
      </g>
    </g>
  </g>
</svg>
